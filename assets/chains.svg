<svg width="1200" height="70" viewBox="0 0 1200 70" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.05" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="0.95" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <mask id="edges">
      <rect width="1200" height="70" fill="url(#fade)"/>
    </mask>

    <g id="row" font-family="'Courier New', monospace" font-size="15" font-weight="bold" letter-spacing="3" fill="#9aa7bd">
      <text x="0"    y="40" textLength="104" lengthAdjust="spacingAndGlyphs">ETHEREUM</text>   <rect x="130"  y="31" width="8" height="8" fill="#627eea"/>
      <text x="164"  y="40" textLength="104" lengthAdjust="spacingAndGlyphs">ARBITRUM</text>   <rect x="294"  y="31" width="8" height="8" fill="#12aaff"/>
      <text x="328"  y="40" textLength="104" lengthAdjust="spacingAndGlyphs">OPTIMISM</text>   <rect x="458"  y="31" width="8" height="8" fill="#ff0420"/>
      <text x="492"  y="40" textLength="52"  lengthAdjust="spacingAndGlyphs">BASE</text>       <rect x="570"  y="31" width="8" height="8" fill="#0052ff"/>
      <text x="604"  y="40" textLength="91"  lengthAdjust="spacingAndGlyphs">POLYGON</text>    <rect x="721"  y="31" width="8" height="8" fill="#8247e5"/>
      <text x="755"  y="40" textLength="78"  lengthAdjust="spacingAndGlyphs">ZKSYNC</text>     <rect x="859"  y="31" width="8" height="8" fill="#8c8dfc"/>
      <text x="893"  y="40" textLength="78"  lengthAdjust="spacingAndGlyphs">SCROLL</text>     <rect x="997"  y="31" width="8" height="8" fill="#d9a35b"/>
      <text x="1031" y="40" textLength="65"  lengthAdjust="spacingAndGlyphs">LINEA</text>      <rect x="1122" y="31" width="8" height="8" fill="#61dfff"/>
      <text x="1156" y="40" textLength="117" lengthAdjust="spacingAndGlyphs">BNB CHAIN</text>  <rect x="1299" y="31" width="8" height="8" fill="#f0b90b"/>
      <text x="1333" y="40" textLength="117" lengthAdjust="spacingAndGlyphs">AVALANCHE</text>  <rect x="1476" y="31" width="8" height="8" fill="#e84142"/>
      <text x="1510" y="40" textLength="78"  lengthAdjust="spacingAndGlyphs">SOLANA</text>     <rect x="1614" y="31" width="8" height="8" fill="#14f195"/>
    </g>
  </defs>

  <g mask="url(#edges)">
    <g>
      <use href="#row"/>
      <use href="#row" x="1648"/>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-1648 0" dur="32s" repeatCount="indefinite"/>
    </g>
  </g>
</svg>
