<svg width="1200" height="340" viewBox="0 0 1200 340" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0a0e17"/>
      <stop offset="1" stop-color="#0e1526"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#70a5fd"/>
      <stop offset="0.5" stop-color="#bf91f3"/>
      <stop offset="1" stop-color="#38bdae"/>
    </linearGradient>
    <linearGradient id="title" x1="380" y1="0" x2="820" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#70a5fd"/>
      <stop offset="0.5" stop-color="#bf91f3"/>
      <stop offset="1" stop-color="#38bdae"/>
      <animate attributeName="x1" values="380;150;380" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="820;1050;820" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="comet" x1="0" y1="0" x2="220" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#70a5fd" stroke-opacity="0.06" fill="none"/>
    </pattern>
    <filter id="soften" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
  </defs>

  <style>
    @keyframes drift1 { from { transform: translate(0,0); }   to { transform: translate(60px,-35px); } }
    @keyframes drift2 { from { transform: translate(0,0); }   to { transform: translate(-70px,28px); } }
    @keyframes drift3 { from { transform: translate(0,0); }   to { transform: translate(45px,45px); } }
    .b1 { animation: drift1 12s ease-in-out infinite alternate; }
    .b2 { animation: drift2 16s ease-in-out infinite alternate; }
    .b3 { animation: drift3 14s ease-in-out infinite alternate; }

    @keyframes rise {
      0%   { transform: translateY(0);      opacity: 0; }
      12%  { opacity: 0.75; }
      85%  { opacity: 0.35; }
      100% { transform: translateY(-330px); opacity: 0; }
    }
    .p { animation: rise linear infinite; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .t1 { animation: fadeUp 0.9s 0.10s ease-out both; }
    .t2 { animation: fadeUp 0.9s 0.45s ease-out both; }
    .t3 { animation: fadeUp 0.9s 0.75s ease-out both; }

    @keyframes scan { from { transform: translateX(-220px); } to { transform: translateX(1200px); } }
    .scan { animation: scan 3.6s linear infinite; }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.15; } }
    .cursor { animation: blink 1.1s step-end infinite; }
  </style>

  <!-- background -->
  <rect width="1200" height="340" fill="url(#bg)"/>
  <rect width="1200" height="340" fill="url(#grid)"/>

  <!-- drifting aurora blobs -->
  <circle class="b1" cx="160" cy="315" r="170" fill="#70a5fd" opacity="0.20" filter="url(#soften)"/>
  <circle class="b2" cx="610" cy="30"  r="190" fill="#bf91f3" opacity="0.18" filter="url(#soften)"/>
  <circle class="b3" cx="1050" cy="310" r="170" fill="#38bdae" opacity="0.16" filter="url(#soften)"/>

  <!-- rising particles -->
  <g>
    <circle class="p" cx="70"   cy="345" r="2"   fill="#70a5fd" style="animation-duration:9s;  animation-delay:-2s;"/>
    <circle class="p" cx="165"  cy="345" r="1.5" fill="#38bdae" style="animation-duration:12s; animation-delay:-7s;"/>
    <circle class="p" cx="255"  cy="345" r="2.5" fill="#bf91f3" style="animation-duration:10s; animation-delay:-4s;"/>
    <circle class="p" cx="350"  cy="345" r="1.5" fill="#70a5fd" style="animation-duration:13s; animation-delay:-9s;"/>
    <circle class="p" cx="455"  cy="345" r="2"   fill="#38bdae" style="animation-duration:8s;  animation-delay:-1s;"/>
    <circle class="p" cx="560"  cy="345" r="1.5" fill="#bf91f3" style="animation-duration:11s; animation-delay:-6s;"/>
    <circle class="p" cx="665"  cy="345" r="2.5" fill="#70a5fd" style="animation-duration:9.5s;animation-delay:-3s;"/>
    <circle class="p" cx="770"  cy="345" r="1.5" fill="#38bdae" style="animation-duration:12.5s;animation-delay:-8s;"/>
    <circle class="p" cx="880"  cy="345" r="2"   fill="#bf91f3" style="animation-duration:10.5s;animation-delay:-5s;"/>
    <circle class="p" cx="985"  cy="345" r="1.5" fill="#70a5fd" style="animation-duration:13.5s;animation-delay:-10s;"/>
    <circle class="p" cx="1085" cy="345" r="2.5" fill="#38bdae" style="animation-duration:9s;  animation-delay:-2.5s;"/>
    <circle class="p" cx="1160" cy="345" r="1.5" fill="#bf91f3" style="animation-duration:11.5s;animation-delay:-6.5s;"/>
  </g>

  <!-- corner accents -->
  <text class="t3" x="36" y="46" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#55627a">~/tpikachu <tspan class="cursor" fill="#70a5fd">▊</tspan></text>
  <text class="t3" x="1164" y="46" text-anchor="end" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#55627a">est. 2018</text>

  <!-- title -->
  <text class="t1" x="600" y="172" text-anchor="middle"
        font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="78" font-weight="800"
        letter-spacing="2" fill="url(#title)">tpikachu ⚡</text>

  <!-- tagline -->
  <text class="t2" x="600" y="232" text-anchor="middle"
        font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" font-weight="600"
        letter-spacing="8" fill="#9aa7bd">AI &#215; BLOCKCHAIN &#215; FULL-STACK</text>

  <!-- sub note -->
  <text class="t3" x="600" y="272" text-anchor="middle"
        font-family="Consolas, 'Courier New', monospace" font-size="14"
        letter-spacing="2" fill="#55627a">TypeScript &#183; Python &#183; Rust &#183; Go &#183; Solidity</text>

  <!-- animated bottom bar -->
  <rect y="334" width="1200" height="6" fill="url(#accent)" opacity="0.9"/>
  <rect class="scan" y="334" width="220" height="6" fill="url(#comet)"/>
</svg>
