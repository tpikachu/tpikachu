<svg width="1200" height="24" viewBox="0 0 1200 24" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <defs>
    <pattern id="dash" width="108" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" width="20" height="4" fill="#70a5fd"/>
      <rect x="36" width="20" height="4" fill="#bf91f3"/>
      <rect x="72" width="20" height="4" fill="#38bdae"/>
    </pattern>
    <linearGradient id="dfade" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.08" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="0.92" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <mask id="edges">
      <rect width="1200" height="24" fill="url(#dfade)"/>
    </mask>
  </defs>
  <rect y="10" width="1200" height="4" fill="url(#dash)" opacity="0.5" mask="url(#edges)"/>
  <g transform="translate(591,3) scale(3)" fill="#ffd932">
    <animate attributeName="opacity" values="1;0.35;1" dur="2.2s" repeatCount="indefinite"/>
    <rect x="4" y="0" width="2" height="2"/>
    <rect x="2" y="2" width="3" height="2"/>
    <rect x="0" y="4" width="2" height="2"/>
  </g>
</svg>
