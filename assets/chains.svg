<svg width="1200" height="70" viewBox="0 0 1200 70" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.05" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="0.95" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <mask id="edges">
      <rect width="1200" height="70" fill="url(#fade)"/>
    </mask>

    <g id="row" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="3" fill="#8b949e">
      <text x="0"    y="40" textLength="104" lengthAdjust="spacingAndGlyphs">ETHEREUM</text>   <circle cx="134"  cy="35" r="4" fill="#627eea"/>
      <text x="164"  y="40" textLength="104" lengthAdjust="spacingAndGlyphs">ARBITRUM</text>   <circle cx="298"  cy="35" r="4" fill="#12aaff"/>
      <text x="328"  y="40" textLength="104" lengthAdjust="spacingAndGlyphs">OPTIMISM</text>   <circle cx="462"  cy="35" r="4" fill="#ff0420"/>
      <text x="492"  y="40" textLength="52"  lengthAdjust="spacingAndGlyphs">BASE</text>       <circle cx="574"  cy="35" r="4" fill="#0052ff"/>
      <text x="604"  y="40" textLength="91"  lengthAdjust="spacingAndGlyphs">POLYGON</text>    <circle cx="725"  cy="35" r="4" fill="#8247e5"/>
      <text x="755"  y="40" textLength="78"  lengthAdjust="spacingAndGlyphs">ZKSYNC</text>     <circle cx="863"  cy="35" r="4" fill="#8c8dfc"/>
      <text x="893"  y="40" textLength="78"  lengthAdjust="spacingAndGlyphs">SCROLL</text>     <circle cx="1001" cy="35" r="4" fill="#d9a35b"/>
      <text x="1031" y="40" textLength="65"  lengthAdjust="spacingAndGlyphs">LINEA</text>      <circle cx="1126" cy="35" r="4" fill="#61dfff"/>
      <text x="1156" y="40" textLength="117" lengthAdjust="spacingAndGlyphs">BNB CHAIN</text>  <circle cx="1303" cy="35" r="4" fill="#f0b90b"/>
      <text x="1333" y="40" textLength="117" lengthAdjust="spacingAndGlyphs">AVALANCHE</text>  <circle cx="1480" cy="35" r="4" fill="#e84142"/>
      <text x="1510" y="40" textLength="78"  lengthAdjust="spacingAndGlyphs">SOLANA</text>     <circle cx="1618" cy="35" r="4" fill="#14f195"/>
    </g>
  </defs>

  <g mask="url(#edges)">
    <g>
      <use href="#row"/>
      <use href="#row" x="1648"/>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-1648 0" dur="32s" repeatCount="indefinite"/>
    </g>
  </g>
</svg>
